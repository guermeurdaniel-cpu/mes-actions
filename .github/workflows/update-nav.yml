name: Mise a jour VL Amundi

on:
  schedule:
    - cron: "*/60 8-18 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-nav:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: |
          pip install curl-cffi playwright
          python -m playwright install --with-deps chromium

      - name: Lancer le robot
        run: python scraper.py

      - name: Enregistrer le patrimoine du jour
        run: python patrimoine.py

      - name: Commiter si modifie
        run: |
          git config user.name "nav-bot"
          git config user.email "nav-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain nav.json history.json patrimoine.json)" ]; then
            git add nav.json history.json patrimoine.json
            git commit -m "MAJ VL + patrimoine"
            git push
          else
            echo "Aucun changement."
          fi
