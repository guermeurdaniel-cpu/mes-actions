name: Alerte ASML

on:
  schedule:
    # Toutes les 15 minutes, de 8h a 18h UTC (= 9h-19h Paris hiver, 10h-20h ete)
    # Les marches Amsterdam ouvrent a 9h et ferment a 17h30 heure locale.
    - cron: "*/15 8-18 * * 1-5"
  workflow_dispatch:   # permet de lancer manuellement pour tester

jobs:
  check-asml:
    runs-on: ubuntu-latest
    steps:
      - name: Verifier le cours ASML
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, sys, datetime

          SYMBOL   = "ASML.AS"
          SEUIL    = 4          # % de baisse declenchant l'alerte
          UA       = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

          url = (
              "https://query1.finance.yahoo.com/v8/finance/chart/"
              + SYMBOL
              + "?range=2d&interval=1d"
          )
          req = urllib.request.Request(url, headers={"User-Agent": UA, "Accept": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=20) as r:
                  data = json.load(r)
          except Exception as e:
              print(f"[alerte] Impossible de joindre Yahoo : {e}")
              sys.exit(0)   # pas d'alerte si Yahoo est injoignable

          try:
              meta   = data["chart"]["result"][0]["meta"]
              price  = meta["regularMarketPrice"]
              prev   = meta["chartPreviousClose"]
              change = (price - prev) / prev * 100
          except Exception as e:
              print(f"[alerte] Format Yahoo inattendu : {e}")
              sys.exit(0)

          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          print(f"[alerte] {SYMBOL}  cours={price:.2f} EUR  veille={prev:.2f} EUR  variation={change:+.2f}%  [{now}]")

          if change <= SEUIL:
              print(f"[ALERTE] Seuil franchi : {change:.2f}% <= {SEUIL}%  -> echec volontaire pour notification GitHub")
              sys.exit(1)   # GitHub envoie un email de notification d'echec
          else:
              print(f"[OK] Pas d'alerte. Variation dans la norme.")
              sys.exit(0)
          PYEOF
