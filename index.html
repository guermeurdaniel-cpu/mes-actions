<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bourse">
<title>Mes valeurs</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:-apple-system,sans-serif; background:#0c0c0e; color:#fff; min-height:100vh; padding:env(safe-area-inset-top) 12px 16px; }
  h1 { font-size:15px; color:#8e8e93; text-align:center; margin:10px 0 2px; }
  .section { font-size:11px; color:#636366; text-transform:uppercase; letter-spacing:.5px; margin:16px 4px 2px; }
  .tot { border-radius:14px; padding:12px 16px; margin-top:8px; }
  .tot.peg { background:#0a84ff; }
  .tot.av { background:#5e5ce6; }
  .tot.pea { background:#bf5af2; }
  .tot .lbl { font-size:13px; color:#e8e8ff; }
  .tot .amount { font-size:22px; font-weight:800; }
  .tot .ratio { font-size:12px; margin-top:4px; }
  .ratio-ok { color:#9affc0; } .ratio-ko { color:#ffb3ab; }
  .row { background:#1c1c1e; border-radius:12px; padding:10px 12px; margin-top:7px; display:grid; grid-template-columns:1fr 88px; grid-gap:10px; align-items:center; }
  .info { min-width:0; }
  .nm { font-size:13px; font-weight:600; color:#e5e5ea; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sub { font-size:11px; color:#8e8e93; margin-top:3px; display:flex; gap:8px; align-items:baseline; flex-wrap:wrap; }
  .pr { font-size:16px; font-weight:700; color:#fff; }
  .up { color:#30d158; } .down { color:#ff453a; }
  .held { color:#0a84ff; font-weight:600; }
  .err { font-size:11px; color:#ff453a; }
  .spark { width:88px; height:40px; display:block; }
  .scale-note { font-size:10px; color:#636366; margin:8px 4px 0; }
  .refresh { display:block; margin:16px auto 0; background:#2c2c2e; color:#0a84ff; border:none; border-radius:10px; padding:8px 16px; font-size:14px; font-weight:600; }
  .synth { background:linear-gradient(135deg,#0e3a2f,#0a2a45); border-radius:16px; padding:14px 16px; margin-top:10px; }
  .synth .lbl { font-size:13px; color:#bfe9d6; }
  .synth .big { font-size:26px; font-weight:800; margin-top:2px; }
  .synth .meta { font-size:12px; color:#cfe6ff; margin-top:2px; }
  .bar { height:14px; border-radius:7px; background:#1c1c1e; overflow:hidden; margin:10px 0 4px; position:relative; display:flex; }
  .bar .eq { background:#30d158; height:100%; }
  .bar .df { background:#0a84ff; height:100%; }
  .bar .tgt { position:absolute; top:-3px; bottom:-3px; width:2px; background:#fff; }
  .legend2 { font-size:11px; color:#8e8e93; display:flex; gap:14px; flex-wrap:wrap; }
  .sig-ok { color:#9affc0; } .sig-ko { color:#ffd479; }
  .geo { margin-top:10px; }
  .contrib { margin-top:12px; border-top:1px solid rgba(255,255,255,.08); padding-top:10px; }
  .cb-head { font-size:12px; color:#cfe6ff; margin-bottom:4px; }
  .cb-env { display:flex; align-items:baseline; gap:8px; font-size:12px; font-weight:700; color:#e8e8ff; margin-top:7px; }
  .cb-line { display:flex; align-items:baseline; gap:8px; font-size:11px; color:#9aa0a6; padding-left:14px; margin-top:2px; }
  .cb-name, .cb-lbl { flex:1 1 auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cb-pct { flex:0 0 62px; text-align:right; font-variant-numeric:tabular-nums; }
  .cb-eur { flex:0 0 96px; text-align:right; font-variant-numeric:tabular-nums; opacity:.72; }
  .cb-foot { font-size:10px; color:#636366; margin-top:8px; }
  .barg { height:12px; border-radius:6px; overflow:hidden; display:flex; background:#1c1c1e; margin:6px 0 4px; }
  .barg .w { background:#5e9eff; height:100%; }
  .barg .e { background:#ffd479; height:100%; }
  .barg .m { background:#ff6482; height:100%; }
  .gap { color:#ff8fa3; }

  /* --- Spark cliquable + modal plein ecran --- */
  .spark-wrap { cursor:pointer; }
  .chart-modal { position:fixed; inset:0; background:#0c0c0e; z-index:1000; display:none; flex-direction:column; padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom); }
  .chart-modal-header { display:flex; align-items:center; justify-content:space-between; padding:10px 4px 6px; }
  .chart-modal-header .ttl { font-size:16px; font-weight:700; color:#fff; }
  .chart-close { background:#2c2c2e; color:#fff; border:none; border-radius:18px; width:34px; height:34px; font-size:16px; }
  .chart-container { flex:1; position:relative; touch-action:none; }
  .chart-readout { text-align:center; font-size:13px; color:#8e8e93; padding:8px 4px 4px; min-height:40px; }
  .chart-readout .v { font-size:19px; font-weight:800; color:#fff; }
  .chart-readout .d { font-size:12px; color:#8e8e93; margin-top:2px; }
  .chart-meta { text-align:center; font-size:11px; color:#636366; padding-bottom:4px; }

  /* --- Indicateur de progression du cumul --- */
  .synth .prog { display:inline-flex; align-items:baseline; gap:6px; margin-top:6px; font-size:13px; cursor:pointer; }
  .synth .prog .pct { font-size:18px; font-weight:800; }
  .synth .prog .eurd { font-size:12px; }
  .synth .prog .since { font-size:11px; color:#9fb6cf; }
  .synth .prog .tap { font-size:10px; color:#7fa6d6; margin-left:2px; }
  .prog-up { color:#5aff9a; }
  .prog-down { color:#ff6b62; }

  /* --- Bouton comparateur + legende multi-courbes --- */
  .compare { display:block; width:calc(100% - 8px); margin:14px 4px 0; background:#1c2740; color:#7fb0ff; border:1px solid #2a3a5e; border-radius:12px; padding:11px 16px; font-size:14px; font-weight:700; }
  .chart-legend { display:flex; flex-wrap:wrap; gap:6px; padding:6px 4px 2px; max-height:34vh; overflow-y:auto; }
  .chip { display:inline-flex; align-items:center; gap:6px; background:#1c1c1e; border:1px solid #2c2c2e; border-radius:16px; padding:5px 10px; font-size:12px; color:#e5e5ea; }
  .chip .dot { width:10px; height:10px; border-radius:50%; flex:0 0 auto; }
  .chip.off { opacity:.34; }
  .chip.off .nm2 { text-decoration:line-through; }
  .legend-tools { display:flex; gap:8px; padding:4px 4px 0; }
  .legend-tools button { background:#2c2c2e; color:#0a84ff; border:none; border-radius:9px; padding:5px 12px; font-size:12px; font-weight:600; }
  .multi-read { text-align:left; font-size:12px; color:#c7c7cc; padding:6px 8px 2px; max-height:24vh; overflow-y:auto; }
  .multi-read .mr-date { text-align:center; font-size:13px; font-weight:700; color:#fff; margin-bottom:4px; }
  .multi-read .mr-row { display:flex; justify-content:space-between; gap:10px; padding:1px 0; }
  .multi-read .mr-row .mr-nm { display:flex; align-items:center; gap:6px; min-width:0; }
  .multi-read .mr-row .mr-nm .dot { width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .multi-read .mr-row .mr-nm span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>
</head>
<body>
  <h1>Mes valeurs</h1>

  <div id="synth"></div>

  <div id="totPeg"></div>
  <div class="section">PEG</div>

  <div id="totPea"></div>
  <div class="section">PEA</div>

  <div id="totAv"></div>
  <div class="section">Assurance vie</div>

  <div id="scaleNote"></div>
  <button class="compare" onclick="openMultiChart()">Comparer les courbes (base 100)</button>
  <button class="refresh" onclick="loadAll()">Actualiser</button>

  <!-- Modal plein ecran pour un graphique detaille -->
  <div id="chartModal" class="chart-modal">
    <div class="chart-modal-header">
      <span class="ttl" id="chartTitle"></span>
      <button class="chart-close" id="chartClose">&#10005;</button>
    </div>
    <div class="chart-meta" id="chartMeta"></div>
    <div class="legend-tools" id="legendTools" style="display:none">
      <button onclick="multiSetAll(true)">Tout</button>
      <button onclick="multiSetAll(false)">Aucun</button>
    </div>
    <div class="chart-legend" id="chartLegend" style="display:none"></div>
    <div class="chart-container" id="chartContainer"></div>
    <div class="chart-readout" id="chartReadout">Glisse le doigt sur le graphique pour lire une valeur</div>
  </div>

<script>
// =======================================================
//  PARAMETRES — modifie uniquement ici
// =======================================================
const QUANTITES = {
  // PEG (fonds Amundi ESR)
  "QS0009080175": 1156.7167 + 941.2472,  // tranche PEG + tranche PER
  "QS0009080746": 75.4236,
  "QS0009080720": 9.4187,
  // Assurance vie - unites de compte
  "FR0011408798": 0.3049,
  "FR0010149120": 1.6886,
  "CC4.PA": 14.3407,        // ETF Amundi Euro Corporate SRI (LU1681039647)
  // PEA
  "WPEA.PA": 5863,
  "PAASI.PA": 248,         // ETF Amundi PEA Asie Emergente (FR0013412012)
  "ASML.AS": 1            // ASML Holding (NL0010273215) - Euronext Amsterdam
};
const FONDS_EUROS       = 18135;   // Assurance vie - fonds euros : valeur actuelle (saisie a la main)
const FONDS_EUROS_VERSE = 18135;   // Assurance vie - fonds euros : montant net verse (gain = valeur - verse)

// --- Prix de revient (PRU) par part + date de reference commune ---
// Tout (cumul, courbe, PMV) est ancre au 16/06/2026. Pour les fonds PEG sans PRU reel,
// la valeur de depart figee est la VL du 16/06. Ligne absente de PRU -> repli 1re VL enregistree.
const REF_DATE = "2026-06-16";
const PRU = {
  "WPEA.PA":      6.78,
  "PAASI.PA":     40.54,
  "ASML.AS":      1723.48,      // ASML Holding - PRU
  // Actions Inter. ESR : tranche PER (941,2472 a 38,68) + tranche PEG (1156,7167, depart 16/06 a 39,07)
  "QS0009080175": (941.2472*38.68 + 1156.7167*39.07)/(941.2472+1156.7167),
  "QS0009080746": 326.83,      // Equilibre ESR - valeur de depart 16/06/2026
  "QS0009080720": 1308.6031,   // Monetaire ESR - valeur de depart 16/06/2026
  "FR0011408798": 10884.88,    // Amundi Euro Liquidity-Rated
  "FR0010149120": 1924.08,     // Carmignac Securite
  "CC4.PA":       226.55       // Amundi Euro Corporate SRI ETF
};
// Enveloppes (sert au detail PMV et au cumul)
const ENVELOPPES = [
  {name:"PEG", keys:["QS0009080175","QS0009080746","QS0009080720"]},
  {name:"PEA", keys:["WPEA.PA","PAASI.PA","ASML.AS"]},
  {name:"AV",  keys:["FR0011408798","FR0010149120","CC4.PA"]}
];

// --- Synthese allocation actions / defensif : parametres ---
const EQ_EQUILIBRE   = 0.50;   // part ACTIONS du fonds Amundi Label Equilibre ESR (bande de gestion 35-65%)
const TARGET_ACTIONS = 0.70;   // cible actions du patrimoine consolide
const BANDE          = 0.05;   // demi-bande de reequilibrage (0.05 = +/- 5 points)
const EQUITY_FRACTION = {
  "QS0009080175": 1.00,          // Amundi Actions Internationales ESR (actions monde)
  "QS0009080746": EQ_EQUILIBRE,  // Amundi Label Equilibre ESR (mixte)
  "QS0009080720": 0.00,          // Amundi Label Monetaire ESR
  "FR0011408798": 0.00,          // Amundi Euro Liquidity-Rated
  "FR0010149120": 0.00,          // Carmignac Securite (oblig court terme)
  "CC4.PA":       0.00,          // Amundi Euro Corporate SRI (oblig)
  "WPEA.PA":      1.00,          // ETF MSCI World
  "PAASI.PA":     1.00,          // ETF PEA Asie Emergente (actions)
  "ASML.AS":      1.00           // ASML Holding (action)
};

// --- Repartition geographique des ACTIONS (par mandat d'indice) ---
const TARGET_EM = 0.10;  // cible emergents en part de la poche actions (0.10 = 10%)
const GEO_EQUITY = {
  "QS0009080175": { world:1.00, euro:0.00, em:0.00 }, // benchmark MSCI World
  "QS0009080746": { world:0.50, euro:0.50, em:0.00 }, // poche actions = 1/2 World + 1/2 zone euro
  "WPEA.PA":      { world:1.00, euro:0.00, em:0.00 }, // MSCI World
  "PAASI.PA":     { world:0.00, euro:0.00, em:1.00 }, // MSCI Emerging Asia (emergents)
  "ASML.AS":      { world:1.00, euro:0.00, em:0.00 }  // ASML - classee Monde developpe
};
// =======================================================

// Valeurs cotees Yahoo : groupe "peg", "pea" ou "av"
const MARKET = [
  { symbol:"WPEA.PA", label:"ETF MSCI World",         group:"pea" },
  { symbol:"PAASI.PA",label:"ETF PEA Asie Emergente", group:"pea" },
  { symbol:"ASML.AS", label:"ASML Holding",           group:"pea" },
  { symbol:"CC4.PA",  label:"Amundi Euro Corp SRI ETF", group:"av" }
];

let pegTotal=0, avUC=0, peaTotal=0;
let allCharts=[]; // registre des series pour la modale plein ecran

function eur(v){ return v.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" EUR"; }
function qtyOf(k){ return QUANTITES[k] || 0; }
// Cout de revient d'une ligne (qte x PRU). null si pas de PRU connu -> repli sur la variation de marche.
function lineCost(k){ return (PRU[k]!=null) ? qtyOf(k)*PRU[k] : null; }

// Palette pour le comparateur multi-courbes
const PALETTE=["#0a84ff","#30d158","#bf5af2","#ff9f0a","#ff453a","#5e5ce6","#64d2ff","#ffd60a","#ff6482","#32d74b","#5ac8fa","#c0a0ff"];
function todayStr(){ return new Date().toISOString().slice(0,10); }

// Construit la serie temporelle du patrimoine consolide (somme qte*VL + fonds euros),
// limitee a la fenetre reellement enregistree (report de la derniere VL connue, jamais de reconstruction du passe).
function buildTotalSeries(data, hist, yres, costBasis){
  const series=[]; // chaque element : {dates:[...], vals:[...]} en EUR
  for(const isin in data){
    const f=data[isin];
    if(f.category!=="PEG" && f.category!=="AV") continue;
    const q=qtyOf(isin); if(!q) continue;
    const h=hist[isin]||[];
    if(h.length){ series.push({ dates:h.map(function(e){return e.date;}), vals:h.map(function(e){return q*e.value;}) }); }
    else if(f.value!=null){ series.push({ dates:[todayStr()], vals:[q*f.value] }); }
  }
  ["WPEA.PA","PAASI.PA","ASML.AS","CC4.PA"].forEach(function(sym){
    const y=yres[sym], q=qtyOf(sym);
    if(y&&y.q&&q){ series.push({ dates:y.q.dates, vals:y.q.closes.map(function(c){return q*c;}) }); }
  });
  if(!series.length) return null;
  // Fenetre honnete : on demarre a la date la plus tardive ou CHAQUE ligne a commence
  // a etre enregistree -> aucune valeur reconstruite vers le passe (pas de back-fill).
  let startDate=null;
  series.forEach(function(s){
    const fd=s.dates.slice().sort()[0];
    if(startDate===null || fd>startDate) startDate=fd;
  });
  const dset={};
  series.forEach(function(s){ s.dates.forEach(function(d){ if(d>=startDate) dset[d]=1; }); });
  const dates=Object.keys(dset).sort();
  if(!dates.length) return null;
  const values=dates.map(function(){ return FONDS_EUROS; }); // fonds euros = constante a chaque date
  series.forEach(function(s){
    const m={}; for(let i=0;i<s.dates.length;i++) m[s.dates[i]]=s.vals[i];
    // valeur reelle la plus recente <= startDate (toujours une donnee enregistree, jamais inventee)
    const sd=s.dates.slice().sort();
    let last=null;
    for(let i=0;i<sd.length;i++){ if(sd[i]<=startDate) last=m[sd[i]]; }
    for(let i=0;i<dates.length;i++){
      if(m[dates[i]]!=null) last=m[dates[i]]; // sinon on reporte la derniere VL connue
      if(last!=null) values[i]+=last;
    }
  });
  // Ancre au 16/06 : on prefixe la serie par le cout de revient total (capital investi) a REF_DATE,
  // de sorte que la courbe parte du montant investi et que sa progression reflete la PMV.
  if(costBasis!=null && isFinite(costBasis) && costBasis>0 && (!dates.length || dates[0]>REF_DATE)){
    dates.unshift(REF_DATE);
    values.unshift(costBasis);
  }
  return { dates:dates, values:values };
}

function toBase100(values){
  if(!values || values.length<2 || !values[0]) return null;
  return values.map(function(v){ return v/values[0]*100; });
}
function sparkline(values100, gmin, gmax, up){
  if(!values100 || values100.length<2) return '<svg class="spark"></svg>';
  const w=88,h=40,pad=3, range=(gmax-gmin)||1;
  const yOf=function(v){ return h-pad-(v-gmin)/range*(h-2*pad); };
  const pts=values100.map(function(v,i){ return (pad+i*(w-2*pad)/(values100.length-1)).toFixed(1)+","+yOf(v).toFixed(1); }).join(" ");
  const color=up?"#30d158":"#ff453a";
  let bl="";
  if(gmin<=100 && gmax>=100){ const y=yOf(100).toFixed(1); bl='<line x1="'+pad+'" y1="'+y+'" x2="'+(w-pad)+'" y2="'+y+'" stroke="#48484a" stroke-width="1" stroke-dasharray="2,2"/>'; }
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+bl+'<polyline fill="none" stroke="'+color+'" stroke-width="2" points="'+pts+'"/></svg>';
}
// Enregistre une serie (avec ses dates) et renvoie le sparkline emballe dans un wrapper cliquable
function sparkClickable(label, dates, values, values100, gmin, gmax, up, unit){
  const svg=sparkline(values100, gmin, gmax, up);
  if(!dates || !values || values.length<2) return svg;
  const idx=allCharts.length;
  allCharts.push({label:label, dates:dates, values:values, up:up, unit:unit||""});
  return '<div class="spark-wrap" data-idx="'+idx+'" onclick="openFullChart('+idx+')">'+svg+'</div>';
}
function variation(values){ if(!values||values.length<2)return null; return (values[values.length-1]-values[0])/values[0]*100; }
function lastChange(values){ if(!values||values.length<2)return null; const a=values[values.length-2],b=values[values.length-1]; return {diff:b-a,pct:(b-a)/a*100}; }
function pctSpan(p,l){ if(p==null||!isFinite(p))return ""; return '<span class="'+(p>=0?'up':'down')+'">'+l+(p>=0?'+':'')+p.toFixed(2)+'%</span>'; }

async function fetchYahoo(symbol){
  const y="https://query1.finance.yahoo.com/v8/finance/chart/"+symbol+"?range=1mo&interval=1d";
  const r=await fetch("https://corsproxy.io/?url="+encodeURIComponent(y));
  if(!r.ok) throw new Error("HTTP "+r.status);
  const d=await r.json(); const res=d.chart.result[0]; const m=res.meta;
  const ts=res.timestamp||[];
  const rawCloses=res.indicators.quote[0].close||[];
  const closes=[], dates=[];
  for(let i=0;i<rawCloses.length;i++){
    if(rawCloses[i]!=null){
      closes.push(rawCloses[i]);
      dates.push(new Date(ts[i]*1000).toISOString().slice(0,10));
    }
  }
  const price=(m.regularMarketPrice!=null)?m.regularMarketPrice:closes[closes.length-1];
  const prev=(m.previousClose!=null)?m.previousClose:closes[closes.length-2];
  return {price:price,prev:prev,cur:m.currency,closes:closes,dates:dates};
}

function rowYahoo(it, gmin, gmax){
  const q=it.q;
  const dayPct=(q.prev?(q.price-q.prev)/q.prev*100:null);
  const h=qtyOf(it.symbol)*q.price;
  const cost=lineCost(it.symbol);
  const pmvPct=(cost!=null && cost>0)? (h-cost)/cost*100 : variation(q.closes); // PMV depuis PRU, sinon repli marche
  const heldTxt=(qtyOf(it.symbol)>0)?'<span class="held">'+eur(h)+'</span>':"";
  const spark=sparkClickable(it.label, q.dates, q.closes, toBase100(q.closes), gmin, gmax, (pmvPct==null?0:pmvPct)>=0, q.cur||"");
  return '<div class="info"><div class="nm">'+it.label+'</div><div class="sub">'
    +'<span class="pr">'+q.price.toFixed(2)+'</span>'+pctSpan(dayPct,"j ")+pctSpan(pmvPct,"PMV ")+heldTxt
    +'</div></div>'+spark;
}
function rowFund(f, series, dates, gmin, gmax){
  const lc=lastChange(series);
  const h=qtyOf(f.isin)*f.value;
  const cost=lineCost(f.isin);
  const pmvPct=(cost!=null && cost>0)? (h-cost)/cost*100 : variation(series); // PMV depuis PRU, sinon repli marche
  const heldTxt=(qtyOf(f.isin)>0)?'<span class="held">'+eur(h)+'</span>':"";
  const val=f.value.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2});
  const oldTxt=(f.status==="ancien")?'<span style="color:#ff9f0a">ancien</span>':"";
  const spark=sparkClickable(f.label, dates, series, toBase100(series), gmin, gmax, (pmvPct==null?0:pmvPct)>=0, "");
  return '<div class="info"><div class="nm">'+f.label+'</div><div class="sub">'
    +'<span class="pr">'+val+'</span>'+oldTxt+pctSpan(lc?lc.pct:null,"j ")+pctSpan(pmvPct,"PMV ")+heldTxt
    +'</div></div>'+spark;
}

async function loadAll(){
  pegTotal=0; avUC=0; peaTotal=0; allCharts=[];
  document.getElementById("peg").innerHTML='<div class="row"><div class="sub">Chargement...</div></div>';
  document.getElementById("refs").innerHTML="";
  document.getElementById("av").innerHTML="";

  // Yahoo
  const yres={};
  for(const t of MARKET){
    try{ yres[t.symbol]={t:t, q:await fetchYahoo(t.symbol)}; }
    catch(e){ yres[t.symbol]={t:t, err:e.message}; }
  }
  // nav.json + history.json
  let data={}, hist={};
  try{
    const navR=await fetch("nav.json?t="+Date.now());
    data=await navR.json();
    try{ const hR=await fetch("history.json?t="+Date.now()); if(hR.ok) hist=await hR.json(); }catch(e){}
  }catch(e){}

  // Echelle base 100 commune a toutes les courbes
  let gmin=Infinity, gmax=-Infinity;
  function scan(s){ const b=toBase100(s); if(b) b.forEach(function(v){ if(v<gmin)gmin=v; if(v>gmax)gmax=v; }); }
  for(const k in yres){ if(yres[k].q) scan(yres[k].q.closes); }
  for(const isin in data){ if(data[isin].status!=="not_found") scan((hist[isin]||[]).map(function(e){return e.value;})); }
  if(!isFinite(gmin)||!isFinite(gmax)||gmin===gmax){ gmin=95; gmax=105; }

  // --- PEG (fonds Amundi ESR) ---
  const pegBox=document.getElementById("peg"); pegBox.innerHTML="";
  for(const isin in data){
    const f=data[isin]; if(f.category!=="PEG") continue;
    const row=document.createElement("div"); row.className="row";
    if(f.value!=null){
      const series=(hist[isin]||[]).map(function(e){return e.value;});
      const dates=(hist[isin]||[]).map(function(e){return e.date;});
      row.innerHTML=rowFund(f,series,dates,gmin,gmax);
      pegTotal += qtyOf(isin)*f.value;
    } else { row.innerHTML='<div class="info"><div class="nm">'+f.label+'</div><div class="err">VL indisponible</div></div><svg class="spark"></svg>'; }
    pegBox.appendChild(row);
  }
  document.getElementById("totPeg").innerHTML='<div class="tot peg"><div class="lbl">Total PEG</div><div class="amount">'+eur(pegTotal)+'</div></div>';

  // --- PEA (ETF Monde) ---
  const refBox=document.getElementById("refs"); refBox.innerHTML="";
  ["WPEA.PA","PAASI.PA","ASML.AS"].forEach(function(sym){
    const it=yres[sym]; if(!it) return;
    const row=document.createElement("div"); row.className="row";
    if(it.q){ row.innerHTML=rowYahoo({symbol:sym,label:it.t.label,q:it.q},gmin,gmax); peaTotal += qtyOf(sym)*it.q.price; }
    else { row.innerHTML='<div class="info"><div class="nm">'+it.t.label+'</div><div class="err">'+it.err+'</div></div><svg class="spark"></svg>'; }
    refBox.appendChild(row);
  });
  document.getElementById("totPea").innerHTML='<div class="tot pea"><div class="lbl">Total PEA</div><div class="amount">'+eur(peaTotal)+'</div></div>';

  // --- Assurance vie ---
  const avBox=document.getElementById("av"); avBox.innerHTML="";
  for(const isin in data){
    const f=data[isin]; if(f.category!=="AV") continue;
    const row=document.createElement("div"); row.className="row";
    if(f.value!=null){
      const series=(hist[isin]||[]).map(function(e){return e.value;});
      const dates=(hist[isin]||[]).map(function(e){return e.date;});
      row.innerHTML=rowFund(f,series,dates,gmin,gmax);
      avUC += qtyOf(isin)*f.value;
    } else { row.innerHTML='<div class="info"><div class="nm">'+f.label+'</div><div class="err">VL indisponible</div></div><svg class="spark"></svg>'; }
    avBox.appendChild(row);
  }
  const cc4=yres["CC4.PA"];
  if(cc4){
    const row=document.createElement("div"); row.className="row";
    if(cc4.q){ row.innerHTML=rowYahoo({symbol:"CC4.PA",label:cc4.t.label,q:cc4.q},gmin,gmax); avUC += qtyOf("CC4.PA")*cc4.q.price; }
    else { row.innerHTML='<div class="info"><div class="nm">'+cc4.t.label+'</div><div class="err">'+cc4.err+'</div></div><svg class="spark"></svg>'; }
    avBox.appendChild(row);
  }
  const rowFE=document.createElement("div"); rowFE.className="row";
  rowFE.innerHTML='<div class="info"><div class="nm">Fonds euros</div><div class="sub"><span class="pr">'+eur(FONDS_EUROS)+'</span><span class="held">'+eur(FONDS_EUROS)+'</span></div></div><svg class="spark"></svg>';
  avBox.appendChild(rowFE);

  const avTotal = avUC + FONDS_EUROS;
  const ratio = avTotal>0 ? avUC/avTotal*100 : 0;
  const cls = ratio>=30 ? "ratio-ok" : "ratio-ko";
  document.getElementById("totAv").innerHTML=
    '<div class="tot av"><div class="lbl">Total assurance vie</div><div class="amount">'+eur(avTotal)+'</div>'
    +'<div class="ratio '+cls+'">Part UC : '+ratio.toFixed(1)+'%  (seuil bonus 30%)</div></div>';

  // --- Plus / moins-value (PRU), ancree au 16/06 : sert au cumul rouge, au detail et a la courbe ---
  function pmvCompute(){
    function curVal(k){
      const q = yres[k] && yres[k].q;
      if(q) return qtyOf(k)*q.price;
      const f = data[k];
      if(f && f.value!=null) return qtyOf(k)*f.value;
      return 0;
    }
    function costVal(k){
      if(PRU[k]!=null) return qtyOf(k)*PRU[k];
      const s=(hist[k]||[]).map(function(e){return e.value;});         // repli : 1re VL enregistree
      if(s.length) return qtyOf(k)*s[0];
      const q=yres[k] && yres[k].q;
      if(q && q.closes && q.closes.length) return qtyOf(k)*q.closes[0];
      return curVal(k);                                                // dernier repli : gain nul
    }
    function lblOf(k){
      if(yres[k] && yres[k].t) return yres[k].t.label;
      if(data[k] && data[k].label) return data[k].label;
      return k;
    }
    let totDay=FONDS_EUROS, totCost=FONDS_EUROS_VERSE, totGain=0;
    const envs=[];
    ENVELOPPES.forEach(function(env){
      let eGain=0; const lines=[];
      env.keys.forEach(function(k){
        const v=curVal(k); if(v<=0) return;
        const c=costVal(k); const g=v-c;
        totDay+=v; totCost+=c; eGain+=g;
        lines.push({label:lblOf(k), g:g});
      });
      if(env.name==="AV"){                                   // fonds euros : gain = valeur - verse
        const feGain=FONDS_EUROS-FONDS_EUROS_VERSE;
        eGain+=feGain; lines.push({label:"Fonds euros", g:feGain});
      }
      totGain+=eGain;
      if(lines.length) envs.push({name:env.name, g:eGain, lines:lines});
    });
    return {totDay:totDay, totCost:totCost, totGain:totGain, envs:envs};
  }
  const pmv=pmvCompute();

  // Detail par ligne, colonnes % et EUR alignees (classes .cb-pct / .cb-eur)
  let contribHtml="";
  if(pmv.totDay>0){
    function pct(g){ const p=g/pmv.totDay*100; const s=p>=0?"+":""; return '<span class="cb-pct '+(p>=0?"up":"down")+'">'+s+p.toFixed(2)+'%</span>'; }
    function de(g){ const s=g>=0?"+":""; return '<span class="cb-eur '+(g>=0?"up":"down")+'">'+s+eur(g)+'</span>'; }
    let body="";
    pmv.envs.forEach(function(env){
      body+='<div class="cb-env"><span class="cb-name">'+env.name+'</span>'+pct(env.g)+de(env.g)+'</div>';
      env.lines.forEach(function(l){
        body+='<div class="cb-line"><span class="cb-lbl">'+l.label+'</span>'+pct(l.g)+de(l.g)+'</div>';
      });
    });
    contribHtml=
      '<div class="contrib"><div class="cb-head">Detail par ligne (PMV depuis le 16/06)</div>'
      +body
      +'<div class="cb-foot">Gain / perte par ligne depuis le PRU, % rapporte au total du jour ; somme = PMV totale.</div></div>';
  }

  // --- Patrimoine consolide : courbe ancree au 16/06 (cout de revient) + cumul rouge = PMV ---
  let totalChartIdx=-1, progHtml="";
  const totalSeries=buildTotalSeries(data,hist,yres,pmv.totCost);
  if(totalSeries && totalSeries.values.length>=2){
    const tv=totalSeries.values, td=totalSeries.dates, n=tv.length;
    totalChartIdx=allCharts.length;
    allCharts.push({label:"Patrimoine total", dates:td, values:tv, up:(tv[n-1]>=tv[0]), unit:"EUR", isTotal:true});
  }
  // Le cumul affiche en haut = la PMV (calcul PRU), pas la variation brute de la courbe.
  if(pmv.totDay>0){
    const totPct=pmv.totGain/pmv.totDay*100;
    const cl=pmv.totGain>=0?"prog-up":"prog-down";
    const sg=pmv.totGain>=0?"+":"";
    const clickable=(totalChartIdx>=0)?' onclick="openFullChart('+totalChartIdx+')"':'';
    progHtml=
      '<div class="prog"'+clickable+'>'
      +'<span class="pct '+cl+'">'+sg+totPct.toFixed(2)+'%</span>'
      +'<span class="eurd '+cl+'">'+sg+eur(pmv.totGain)+'</span>'
      +'<span class="since">PMV depuis le 16/06</span>'
      +(totalChartIdx>=0?'<span class="tap">&#9654; voir la courbe</span>':'')+'</div>';
  }

  // --- Synthese allocation actions / defensif (agregat des 3 enveloppes) ---
  (function(){
    function valFund(isin){ return (data[isin]&&data[isin].value!=null)? qtyOf(isin)*data[isin].value : 0; }
    function valYahoo(sym){ return (yres[sym]&&yres[sym].q)? qtyOf(sym)*yres[sym].q.price : 0; }
    function holdingEur(k){ return (k==="WPEA.PA"||k==="PAASI.PA"||k==="ASML.AS"||k==="CC4.PA")? valYahoo(k) : valFund(k); }
    var actions=0, defensif=0, total=0;
    for(var k in EQUITY_FRACTION){
      var v=holdingEur(k); if(!v) continue;
      var eq=v*EQUITY_FRACTION[k];
      actions+=eq; defensif+=v-eq; total+=v;
    }
    defensif+=FONDS_EUROS; total+=FONDS_EUROS;   // fonds euros = 100% defensif
    var euroEqEquilibre = valFund("QS0009080746")*0.25;  // poche MSCI EMU du fonds Equilibre
    var pAct = total>0? actions/total : 0;
    var drift = pAct - TARGET_ACTIONS;
    var inBand = Math.abs(drift) <= BANDE;
    var moveEur = Math.abs(drift)*total;
    var gw=0, ge=0, gm=0;
    for(var g in GEO_EQUITY){
      var ve=holdingEur(g)*(EQUITY_FRACTION[g]||0); if(!ve) continue;
      gw+=ve*GEO_EQUITY[g].world; ge+=ve*GEO_EQUITY[g].euro; gm+=ve*GEO_EQUITY[g].em;
    }
    var geoTot=(gw+ge+gm)||1;
    var gwP=gw/geoTot*100, geP=ge/geoTot*100, gmP=gm/geoTot*100;
    var geoHtml=
      '<div class="geo"><div class="meta">Repartition des actions (par indice) : '
      +'<span style="color:#5e9eff">Monde dev. '+gwP.toFixed(0)+'%</span> - '
      +'<span style="color:#ffd479">Zone euro '+geP.toFixed(0)+'%</span> - '
      +'<span style="color:#ff6482">Emergents '+gmP.toFixed(0)+'%</span></div>'
      +'<div class="barg"><div class="w" style="width:'+gwP.toFixed(1)+'%"></div><div class="e" style="width:'+geP.toFixed(1)+'%"></div><div class="m" style="width:'+gmP.toFixed(1)+'%"></div></div>'
      +'<div class="meta gap">Emergents : '+eur(gm)+' ('+gmP.toFixed(0)+'%).</div></div>';
    var eqW=(pAct*100).toFixed(1), dfW=((1-pAct)*100).toFixed(1);
    var tgtLeft=(TARGET_ACTIONS*100).toFixed(1);
    var sig = inBand
      ? '<span class="sig-ok">Dans la bande (cible '+(TARGET_ACTIONS*100).toFixed(0)+'/'+((1-TARGET_ACTIONS)*100).toFixed(0)+', +/- '+(BANDE*100).toFixed(0)+' pts)</span>'
      : '<span class="sig-ko">Reequilibrage suggere : '+(drift>0?'alleger':'renforcer')+' les actions d environ '+eur(moveEur)+'</span>';
    document.getElementById("synth").innerHTML=
      '<div class="synth"><div class="lbl">Patrimoine consolide (PEG + PEA + AV)</div>'
      +'<div class="big">'+eur(total)+'</div>'
      +progHtml
      +contribHtml
      +'<div class="meta">Actions '+eqW+'%  -  Defensif '+dfW+'%  -  ecart cible '+(drift>=0?'+':'')+(drift*100).toFixed(1)+' pts</div>'
      +'<div class="bar"><div class="eq" style="width:'+eqW+'%"></div><div class="df" style="width:'+dfW+'%"></div><div class="tgt" style="left:'+tgtLeft+'%"></div></div>'
      +'<div class="legend2"><span style="color:#30d158">Actions '+eur(actions)+'</span><span style="color:#0a84ff">Defensif '+eur(defensif)+'</span></div>'
      +'<div class="meta" style="margin-top:6px">Dont actions zone euro (poche MSCI EMU de l Equilibre) : ~'+eur(euroEqEquilibre)+'</div>'
      +'<div class="meta" style="margin-top:4px">'+sig+'</div>'+geoHtml+'</div>';
  })();

  document.getElementById("scaleNote").innerHTML='<div class="scale-note">Courbes base 100, echelle commune '+gmin.toFixed(1)+'-'+gmax.toFixed(1)+'. j=jour, 1m=1 mois, tot=depuis debut.</div>';
}

// =======================================================
//  GRAPHIQUE PLEIN ECRAN avec axe de dates + lecture tactile
// =======================================================
function fmtDate(s){
  // s = "YYYY-MM-DD" -> "jj/mm"
  if(!s) return "";
  const p=s.split("-");
  return p.length===3 ? p[2]+"/"+p[1] : s;
}
// Liaison tactile partagee entre le mode simple et le mode comparatif
let activeShowAt=null, chartPointerBound=false;
function bindChartPointer(){
  if(chartPointerBound) return;
  const cont=document.getElementById("chartContainer");
  function ptr(e){ if(!activeShowAt) return; const p=(e.touches&&e.touches[0])?e.touches[0]:e; activeShowAt(p.clientX); }
  cont.addEventListener("pointerdown", ptr);
  cont.addEventListener("pointermove", function(e){ if(e.buttons||e.pressure>0||e.pointerType==="touch") ptr(e); });
  cont.addEventListener("touchstart", ptr, {passive:true});
  cont.addEventListener("touchmove", ptr, {passive:true});
  chartPointerBound=true;
}

function openFullChart(idx){
  const d=allCharts[idx];
  if(!d) return;
  document.getElementById("legendTools").style.display="none";
  document.getElementById("chartLegend").style.display="none";
  document.getElementById("chartTitle").textContent=d.label;
  document.getElementById("chartModal").style.display="flex";
  document.getElementById("chartReadout").innerHTML="Glisse le doigt sur le graphique pour lire une valeur";
  drawFullChart(d);
}
function closeFullChart(){
  document.getElementById("chartModal").style.display="none";
}
document.getElementById("chartClose").addEventListener("click", closeFullChart);

// =======================================================
//  COMPARATEUR : toutes les courbes superposees en base 100
// =======================================================
let multi={ items:[], dates:[], series100:[], visible:[] };

function openMultiChart(){
  // series exploitables (au moins 2 points)
  const items=allCharts.filter(function(c){ return c.values && c.values.length>=2; });
  if(items.length<1){ return; }
  // axe de dates commun
  const dset={};
  items.forEach(function(c){ (c.dates||[]).forEach(function(d){ dset[d]=1; }); });
  const dates=Object.keys(dset).sort();
  // chaque serie : remplissage avant/arriere sur l'axe commun, puis base 100
  const series100=items.map(function(c){
    const m={}; for(let i=0;i<c.dates.length;i++) m[c.dates[i]]=c.values[i];
    let firstKnown=null;
    for(let i=0;i<dates.length;i++){ if(m[dates[i]]!=null){ firstKnown=m[dates[i]]; break; } }
    const aligned=[]; let last=null;
    for(let i=0;i<dates.length;i++){
      if(m[dates[i]]!=null) last=m[dates[i]];
      aligned.push((last!=null)?last:firstKnown);
    }
    const base=aligned[0]||1;
    return aligned.map(function(v){ return v/base*100; });
  });
  multi={ items:items, dates:dates, series100:series100, visible:items.map(function(){return true;}) };

  document.getElementById("chartTitle").textContent="Comparatif base 100";
  document.getElementById("chartMeta").textContent=
    items.length+" courbes - du "+fmtDate(dates[0])+" au "+fmtDate(dates[dates.length-1])+" - base 100 = depart";
  document.getElementById("legendTools").style.display="flex";
  document.getElementById("chartLegend").style.display="flex";
  document.getElementById("chartReadout").innerHTML='<div class="multi-read">Glisse le doigt pour comparer les valeurs a une date</div>';
  document.getElementById("chartModal").style.display="flex";
  renderLegend();
  drawMultiChart();
}
function renderLegend(){
  const box=document.getElementById("chartLegend");
  box.innerHTML=multi.items.map(function(c,i){
    const col=PALETTE[i%PALETTE.length];
    return '<div class="chip '+(multi.visible[i]?"":"off")+'" onclick="multiToggle('+i+')">'
      +'<span class="dot" style="background:'+col+'"></span><span class="nm2">'+c.label+'</span></div>';
  }).join("");
}
function multiToggle(i){ multi.visible[i]=!multi.visible[i]; renderLegend(); drawMultiChart(); }
function multiSetAll(v){ multi.visible=multi.visible.map(function(){return v;}); renderLegend(); drawMultiChart(); }

function drawMultiChart(){
  const cont=document.getElementById("chartContainer");
  cont.innerHTML="";
  const dates=multi.dates, n=dates.length;
  if(!n){ return; }
  const W=cont.clientWidth||window.innerWidth, H=cont.clientHeight||300;
  const padL=40, padR=10, padT=12, padB=26;
  // bornes Y sur les seules courbes visibles
  let ymin=Infinity, ymax=-Infinity;
  multi.series100.forEach(function(s,i){
    if(!multi.visible[i]) return;
    s.forEach(function(v){ if(v<ymin)ymin=v; if(v>ymax)ymax=v; });
  });
  if(!isFinite(ymin)||!isFinite(ymax)){ ymin=95; ymax=105; }
  if(ymin===ymax){ ymin-=1; ymax+=1; }
  const yp=(ymax-ymin)*0.08; ymin-=yp; ymax+=yp;
  const xOf=function(i){ return padL+(n<=1?0:i*(W-padL-padR)/(n-1)); };
  const yOf=function(v){ return H-padB-(v-ymin)/(ymax-ymin)*(H-padT-padB); };

  // grille Y (3 lignes) + ligne 100
  let grid="";
  for(let k=0;k<=2;k++){
    const v=ymin+(ymax-ymin)*k/2, y=yOf(v).toFixed(1);
    grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#2c2c2e" stroke-width="1"/>'
      +'<text x="4" y="'+(parseFloat(y)+4)+'" font-size="11" fill="#8e8e93">'+v.toFixed(1)+'</text>';
  }
  if(ymin<=100&&ymax>=100){ const y=yOf(100).toFixed(1); grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#48484a" stroke-width="1" stroke-dasharray="3,3"/>'; }
  // axe X (dates)
  let xAxis=""; const nT=Math.min(5,n);
  for(let k=0;k<nT;k++){ const i=Math.round(k*(n-1)/(nT-1||1)); xAxis+='<text x="'+xOf(i).toFixed(1)+'" y="'+(H-8)+'" font-size="11" fill="#8e8e93" text-anchor="middle">'+fmtDate(dates[i])+'</text>'; }
  // polylignes
  let lines="";
  multi.series100.forEach(function(s,idx){
    if(!multi.visible[idx]) return;
    const col=PALETTE[idx%PALETTE.length];
    const pts=s.map(function(v,i){ return xOf(i).toFixed(1)+","+yOf(v).toFixed(1); }).join(" ");
    lines+='<polyline fill="none" stroke="'+col+'" stroke-width="'+(multi.items[idx].isTotal?3:1.8)+'" points="'+pts+'" opacity="0.95"/>';
  });
  cont.innerHTML=
    '<svg id="multiSvg" width="'+W+'" height="'+H+'" style="display:block;touch-action:none">'
    +grid+lines+xAxis
    +'<g id="mCross" style="display:none"><line id="mLine" y1="'+padT+'" y2="'+(H-padB)+'" stroke="#8e8e93" stroke-width="1" stroke-dasharray="3,3"/></g>'
    +'</svg>';

  function showAt(clientX){
    const rect=cont.getBoundingClientRect();
    const x=Math.max(padL,Math.min(W-padR,clientX-rect.left));
    let i=Math.round((x-padL)/((W-padL-padR)/(n-1||1)));
    i=Math.max(0,Math.min(n-1,i));
    const cx=xOf(i);
    const g=document.getElementById("mCross"); g.style.display="block";
    document.getElementById("mLine").setAttribute("x1",cx); document.getElementById("mLine").setAttribute("x2",cx);
    let rows="";
    multi.items.forEach(function(c,k){
      if(!multi.visible[k]) return;
      const v=multi.series100[k][i], col=PALETTE[k%PALETTE.length];
      const dv=v-100, sg=dv>=0?"+":"", cl=dv>=0?"prog-up":"prog-down";
      rows+='<div class="mr-row"><span class="mr-nm"><span class="dot" style="background:'+col+'"></span><span>'+c.label+'</span></span>'
        +'<span class="'+cl+'">'+v.toFixed(1)+' ('+sg+dv.toFixed(1)+'%)</span></div>';
    });
    document.getElementById("chartReadout").innerHTML=
      '<div class="multi-read"><div class="mr-date">'+dates[i]+'</div>'+(rows||'<div class="mr-row">Aucune courbe selectionnee</div>')+'</div>';
  }
  function ptr(e){ const p=(e.touches&&e.touches[0])?e.touches[0]:e; showAt(p.clientX); }
  activeShowAt=showAt; bindChartPointer();
  showAt(xOf(n-1)+cont.getBoundingClientRect().left);
}

function drawFullChart(d){
  const cont=document.getElementById("chartContainer");
  cont.innerHTML="";
  const values=d.values, dates=d.dates, n=values.length;
  const moPct=variation(values);
  document.getElementById("chartMeta").textContent=
    n+" points - du "+fmtDate(dates[0])+" au "+fmtDate(dates[n-1])
    +(moPct!=null?"  -  variation periode : "+(moPct>=0?"+":"")+moPct.toFixed(2)+"%":"");

  const W=cont.clientWidth||window.innerWidth, H=cont.clientHeight||300;
  const padL=44, padR=10, padT=14, padB=26;
  const vmin=Math.min.apply(null,values), vmax=Math.max.apply(null,values);
  const vpad=(vmax-vmin)*0.08 || vmax*0.02 || 1;
  const ymin=vmin-vpad, ymax=vmax+vpad;
  const xOf=function(i){ return padL+(n<=1?0:i*(W-padL-padR)/(n-1)); };
  const yOf=function(v){ return H-padB-(v-ymin)/(ymax-ymin)*(H-padT-padB); };
  const up=(moPct==null?0:moPct)>=0;
  const color=up?"#30d158":"#ff453a";

  const pts=values.map(function(v,i){ return xOf(i).toFixed(1)+","+yOf(v).toFixed(1); }).join(" ");
  const areaPts="M"+xOf(0).toFixed(1)+","+ (H-padB) +" L"+pts.split(" ").join(" L")+" L"+xOf(n-1).toFixed(1)+","+(H-padB)+" Z";

  // graduations Y (3 lignes)
  let gridSvg="";
  for(let k=0;k<=2;k++){
    const v=ymin+(ymax-ymin)*k/2;
    const y=yOf(v).toFixed(1);
    gridSvg+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#2c2c2e" stroke-width="1"/>'
      +'<text x="4" y="'+(parseFloat(y)+4)+'" font-size="11" fill="#8e8e93">'+v.toFixed(v<10?3:2)+'</text>';
  }
  // graduations X (dates) : ~5 reperes
  let xAxisSvg="";
  const nTicks=Math.min(5,n);
  for(let k=0;k<nTicks;k++){
    const i=Math.round(k*(n-1)/(nTicks-1||1));
    const x=xOf(i).toFixed(1);
    xAxisSvg+='<text x="'+x+'" y="'+(H-8)+'" font-size="11" fill="#8e8e93" text-anchor="middle">'+fmtDate(dates[i])+'</text>';
  }

  const svgHtml=
    '<svg id="fullChartSvg" width="'+W+'" height="'+H+'" style="display:block;touch-action:none">'
    +gridSvg
    +'<path d="'+areaPts+'" fill="'+color+'" opacity="0.12" stroke="none"/>'
    +'<polyline fill="none" stroke="'+color+'" stroke-width="2.5" points="'+pts+'"/>'
    +xAxisSvg
    +'<g id="crosshair" style="display:none">'
      +'<line id="chLine" x1="0" y1="'+padT+'" x2="0" y2="'+(H-padB)+'" stroke="#8e8e93" stroke-width="1" stroke-dasharray="3,3"/>'
      +'<circle id="chDot" r="5" fill="'+color+'" stroke="#0c0c0e" stroke-width="2"/>'
    +'</g>'
    +'</svg>';
  cont.innerHTML=svgHtml;

  function showAt(clientX){
    const rect=cont.getBoundingClientRect();
    const x=Math.max(padL,Math.min(W-padR,clientX-rect.left));
    let i=Math.round((x-padL)/((W-padL-padR)/(n-1||1)));
    i=Math.max(0,Math.min(n-1,i));
    const cx=xOf(i), cy=yOf(values[i]);
    const ch=document.getElementById("crosshair");
    ch.style.display="block";
    document.getElementById("chLine").setAttribute("x1",cx); document.getElementById("chLine").setAttribute("x2",cx);
    document.getElementById("chDot").setAttribute("cx",cx); document.getElementById("chDot").setAttribute("cy",cy);
    const v=values[i];
    const valTxt=(d.unit==="EUR"||d.unit==="")? v.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:4}) : v.toFixed(4);
    document.getElementById("chartReadout").innerHTML=
      '<div class="v">'+valTxt+(d.unit?" "+d.unit:"")+'</div><div class="d">'+dates[i]+'</div>';
  }
  activeShowAt=showAt; bindChartPointer();
  // valeur initiale = dernier point
  showAt(xOf(n-1)+cont.getBoundingClientRect().left);
}

loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
