<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bourse">
<title>Mes valeurs</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:-apple-system,sans-serif; background:#0c0c0e; color:#fff; min-height:100vh; padding:env(safe-area-inset-top) 16px 24px; }
  h1 { font-size:17px; color:#8e8e93; text-align:center; margin:16px 0 4px; }
  .section { font-size:13px; color:#636366; text-transform:uppercase; letter-spacing:.5px; margin:22px 4px 0; }
  .card { background:#1c1c1e; border-radius:18px; padding:20px; margin-top:12px; }
  .total-card { background:#0a84ff; border-radius:18px; padding:20px; margin-top:12px; }
  .total-card .lbl { font-size:14px; color:#cfe5ff; }
  .total-card .amount { font-size:34px; font-weight:800; margin-top:4px; }
  .name { font-size:15px; color:#8e8e93; }
  .price { font-size:32px; font-weight:700; margin:4px 0; }
  .change { font-size:16px; font-weight:600; }
  .held { font-size:15px; font-weight:600; color:#0a84ff; margin-top:10px; }
  .up { color:#30d158; } .down { color:#ff453a; }
  .meta { font-size:12px; color:#636366; margin-top:8px; }
  .spark { margin-top:14px; width:100%; height:60px; display:block; }
  .scale-note { font-size:11px; color:#636366; margin:8px 4px 0; }
  .refresh { display:block; margin:24px auto 0; background:#2c2c2e; color:#0a84ff; border:none; border-radius:12px; padding:10px 18px; font-size:15px; font-weight:600; }
</style>
</head>
<body>
  <h1>Mes valeurs</h1>

  <div id="total"></div>

  <div class="section">Marche en direct</div>
  <div id="cards"></div>

  <div class="section">Fonds Amundi</div>
  <div id="amundi"></div>

  <div id="scaleNote"></div>
  <button class="refresh" onclick="loadAll()">Actualiser</button>
<script>
// =======================================================
//  NOMBRE DE PARTS DETENUES — modifie uniquement ici
// =======================================================
const QUANTITES = {
  "AIR.PA": 0,
  "WPEA.PA": 0,
  "QS0009080175": 1156.7167 + 941.2472,
  "QS0009080746": 75.4236,
  "QS0009080720": 9.4187
};
// =======================================================

const TICKERS = [
  { symbol:"AIR.PA",  label:"Airbus" },
  { symbol:"WPEA.PA", label:"ETF MSCI World (WPEA)" }
];

let totals = {};

function formatEur(v){
  return v.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" EUR";
}
function heldMontant(key, unitPrice){
  const qty = QUANTITES[key] || 0;
  const montant = qty * unitPrice;
  totals[key] = montant;
  return { qty:qty, montant:montant };
}
function heldLine(h){
  if(h.qty <= 0) return "";
  return '<div class="held">Detenu : '+formatEur(h.montant)+' ('+h.qty+' parts)</div>';
}
function renderTotal(){
  let sum = 0;
  for(const k in totals){ if(isFinite(totals[k])) sum += totals[k]; }
  document.getElementById("total").innerHTML =
    '<div class="total-card"><div class="lbl">Total du portefeuille</div>'
    + '<div class="amount">'+formatEur(sum)+'</div></div>';
}

// --- base 100 d'une serie ---
function toBase100(values){
  if(!values || values.length < 2 || !values[0]) return null;
  return values.map(function(v){ return v/values[0]*100; });
}

// --- courbe avec echelle imposee (min/max communs) ---
function sparkline(values100, gmin, gmax, up){
  if(!values100 || values100.length < 2) return "";
  const w=300, h=60, pad=5;
  const range = (gmax-gmin) || 1;
  const yOf = function(v){ return h-pad - (v-gmin)/range*(h-2*pad); };
  const pts = values100.map(function(v,i){
    const x = pad + i*(w-2*pad)/(values100.length-1);
    return x.toFixed(1)+","+yOf(v).toFixed(1);
  }).join(" ");
  const color = up ? "#30d158" : "#ff453a";
  let baseline = "";
  if(gmin <= 100 && gmax >= 100){
    const y100 = yOf(100).toFixed(1);
    baseline = '<line x1="'+pad+'" y1="'+y100+'" x2="'+(w-pad)+'" y2="'+y100+'" stroke="#48484a" stroke-width="1" stroke-dasharray="3,3"/>';
  }
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+baseline+'<polyline fill="none" stroke="'+color+'" stroke-width="2" points="'+pts+'"/></svg>';
}

function variation(values){
  if(!values || values.length < 2) return null;
  const a=values[0], b=values[values.length-1];
  return (b-a)/a*100;
}
function lastChange(values){
  if(!values || values.length < 2) return null;
  const a=values[values.length-2], b=values[values.length-1];
  return { diff:b-a, pct:(b-a)/a*100 };
}

async function fetchYahoo(symbol){
  const yahoo = "https://query1.finance.yahoo.com/v8/finance/chart/"+symbol+"?range=1mo&interval=1d";
  const url = "https://corsproxy.io/?url="+encodeURIComponent(yahoo);
  const r = await fetch(url);
  if(!r.ok) throw new Error("HTTP " + r.status);
  const d = await r.json();
  const res = d.chart.result[0];
  const m = res.meta;
  const closes = (res.indicators.quote[0].close || []).filter(function(v){ return v!=null; });
  const price = (m.regularMarketPrice != null) ? m.regularMarketPrice : closes[closes.length-1];
  const prevClose = (m.previousClose != null) ? m.previousClose : closes[closes.length-2];
  return { price:price, prevClose:prevClose, currency:m.currency, time:new Date(m.regularMarketTime*1000), closes:closes };
}

async function loadAll(){
  totals = {};
  document.getElementById("cards").innerHTML = '<div class="card"><div class="meta">Chargement...</div></div>';
  document.getElementById("amundi").innerHTML = "";
  document.getElementById("scaleNote").innerHTML = "";

  const items = []; // { container, html-builder data, series100 }

  // 1) Valeurs cotees
  for(const t of TICKERS){
    try{
      const q = await fetchYahoo(t.symbol);
      items.push({ kind:"yahoo", t:t, q:q, series100: toBase100(q.closes) });
    }catch(e){
      items.push({ kind:"yahoo-error", t:t, err:e.message });
    }
  }

  // 2) Fonds Amundi
  try{
    const navR = await fetch("nav.json?t=" + Date.now());
    let histR = null;
    try { histR = await fetch("history.json?t=" + Date.now()); } catch(e){ histR = null; }
    const data = await navR.json();
    const hist = (histR && histR.ok) ? await histR.json() : {};
    for(const isin in data){
      const f = data[isin];
      const series = (f.status==="ok" && f.value!=null) ? (hist[isin]||[]).map(function(e){return e.value;}) : [];
      items.push({ kind:"amundi", f:f, series:series, series100: toBase100(series) });
    }
  }catch(e){
    items.push({ kind:"amundi-error", err:e.message });
  }

  // 3) Echelle commune (base 100) sur toutes les series exploitables
  let gmin = Infinity, gmax = -Infinity;
  items.forEach(function(it){
    if(it.series100){
      it.series100.forEach(function(v){ if(v<gmin) gmin=v; if(v>gmax) gmax=v; });
    }
  });
  if(!isFinite(gmin) || !isFinite(gmax) || gmin===gmax){ gmin=95; gmax=105; }

  // 4) Rendu
  const cBox = document.getElementById("cards"); cBox.innerHTML="";
  const aBox = document.getElementById("amundi"); aBox.innerHTML="";

  items.forEach(function(it){
    const card = document.createElement("div"); card.className="card";
    if(it.kind==="yahoo"){
      const q=it.q, t=it.t;
      const diff=q.price-q.prevClose, pct=(diff/q.prevClose)*100;
      const okDay=isFinite(diff)&&isFinite(pct);
      const sign=diff>=0?"+":""; const cls=diff>=0?"up":"down";
      const dayTxt=okDay?'<div class="change '+cls+'">'+sign+diff.toFixed(2)+' ('+sign+pct.toFixed(2)+'%)</div>':"";
      const moPct=variation(q.closes);
      const moTxt=(moPct==null)?"":'<div class="meta">1 mois : <span class="'+(moPct>=0?'up':'down')+'">'+(moPct>=0?'+':'')+moPct.toFixed(2)+'%</span></div>';
      const up=((moPct==null?0:moPct)>=0);
      const h=heldMontant(t.symbol,q.price);
      card.innerHTML='<div class="name">'+t.label+' &middot; '+t.symbol+'</div>'
        +'<div class="price">'+q.price.toFixed(2)+' '+q.currency+'</div>'
        +dayTxt+sparkline(it.series100,gmin,gmax,up)+moTxt+heldLine(h)
        +'<div class="meta">Mis a jour : '+q.time.toLocaleTimeString("fr-FR")+'</div>';
      cBox.appendChild(card);
    } else if(it.kind==="yahoo-error"){
      card.innerHTML='<div class="name">'+it.t.label+'</div><div class="meta">Erreur : '+it.err+'</div>';
      cBox.appendChild(card);
    } else if(it.kind==="amundi"){
      const f=it.f;
      if(f.status==="ok" && f.value!=null){
        const dateFr=f.date.split("-").reverse().join("/");
        const moPct=variation(it.series);
        const lc=lastChange(it.series);
        const dayTxt=lc?'<div class="change '+(lc.diff>=0?'up':'down')+'">'+(lc.diff>=0?'+':'')+lc.diff.toFixed(2)+' ('+(lc.diff>=0?'+':'')+lc.pct.toFixed(2)+'%)</div>':"";
        const moTxt=(moPct==null)?'<div class="meta">historique en cours de constitution...</div>':'<div class="meta">depuis le debut : <span class="'+(moPct>=0?'up':'down')+'">'+(moPct>=0?'+':'')+moPct.toFixed(2)+'%</span></div>';
        const up=((moPct==null?0:moPct)>=0);
        const valStr=f.value.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:4});
        const h=heldMontant(f.isin,f.value);
        card.innerHTML='<div class="name">'+f.label+' &middot; '+f.isin+'</div>'
          +'<div class="price">'+valStr+' '+f.currency+'</div>'
          +dayTxt+sparkline(it.series100,gmin,gmax,up)+moTxt+heldLine(h)
          +'<div class="meta">VL au '+dateFr+'</div>';
      } else {
        card.innerHTML='<div class="name">'+f.label+' &middot; '+f.isin+'</div><div class="meta">VL non disponible</div>';
      }
      aBox.appendChild(card);
    } else if(it.kind==="amundi-error"){
      card.innerHTML='<div class="meta">Erreur : '+it.err+'</div>';
      aBox.appendChild(card);
    }
  });

  document.getElementById("scaleNote").innerHTML =
    '<div class="scale-note">Courbes en base 100, echelle commune : de '+gmin.toFixed(1)+' a '+gmax.toFixed(1)+' (ligne pointillee = base 100). Sur 1 mois pour les valeurs cotees.</div>';

  renderTotal();
}

loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
