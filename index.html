<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mes valeurs</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,sans-serif; background:#0c0c0e; color:#fff; min-height:100vh; padding:20px 16px; }
  h1 { font-size:17px; color:#8e8e93; text-align:center; }
  .card { background:#1c1c1e; border-radius:18px; padding:20px; margin-top:12px; }
  .name { font-size:15px; color:#8e8e93; }
  .price { font-size:40px; font-weight:700; margin:4px 0; }
  .change { font-size:17px; font-weight:600; }
  .up { color:#30d158; } .down { color:#ff453a; }
  .meta { font-size:12px; color:#636366; margin-top:8px; word-break:break-all; }
  .refresh { display:block; margin:20px auto 0; background:#2c2c2e; color:#0a84ff; border:none; border-radius:12px; padding:10px 18px; font-size:15px; font-weight:600; }
</style>
</head>
<body>
  <h1>Mes valeurs</h1>
  <div id="cards"></div>
  <button class="refresh" onclick="loadAll()">Actualiser</button>
<script>
const TICKERS = [{ symbol:"AIR.PA", label:"Airbus" }];

async function fetchQuote(symbol){
  const target = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`;
  const proxied = `https://corsproxy.io/?url=${encodeURIComponent(target)}`;
  const r = await fetch(proxied);
  if(!r.ok) throw new Error("HTTP " + r.status);
  const txt = await r.text();
  let d;
  try { d = JSON.parse(txt); }
  catch(e){ throw new Error("Réponse non-JSON : " + txt.slice(0,120)); }
  if(!d.chart || !d.chart.result) throw new Error("Format inattendu : " + JSON.stringify(d).slice(0,120));
  const m = d.chart.result[0].meta;
  return { price:m.regularMarketPrice, prevClose:m.previousClose, currency:m.currency, time:new Date(m.regularMarketTime*1000) };
}

async function loadAll(){
  const c = document.getElementById("cards"); c.innerHTML="";
  for(const t of TICKERS){
    const card = document.createElement("div"); card.className="card";
    card.innerHTML = `<div class="name">${t.label}</div><div class="price">…</div>`;
    c.appendChild(card);
    try{
      const q = await fetchQuote(t.symbol);
      const diff = q.price - q.prevClose, pct=(diff/q.prevClose)*100;
      const sign = diff>=0?"+":""; const cls = diff>=0?"up":"down";
      card.innerHTML = `<div class="name">${t.label} · ${t.symbol}</div>
        <div class="price">${q.price.toFixed(2)} ${q.currency}</div>
        <div class="change ${cls}">${sign}${diff.toFixed(2)} (${sign}${pct.toFixed(2)}%)</div>
        <div class="meta">Mis à jour : ${q.time.toLocaleTimeString("fr-FR")}</div>`;
    }catch(e){
      card.innerHTML = `<div class="name">${t.label}</div><div class="meta">⚠️ ${e.message}</div>`;
    }
  }
}
loadAll();
</script>
</body>
</html>
