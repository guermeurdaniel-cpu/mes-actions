<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diagnostic Bourse</title>
<style>
  body { margin:0; font-family:-apple-system,sans-serif; background:#0c0c0e; color:#fff; padding:16px; }
  h1 { font-size:17px; color:#8e8e93; text-align:center; }
  .card { background:#1c1c1e; border-radius:14px; padding:14px; margin-top:10px; font-size:13px; word-break:break-all; }
  .ok { border-left:4px solid #30d158; }
  .ko { border-left:4px solid #ff453a; }
  .title { font-weight:700; margin-bottom:6px; font-size:14px; }
  .price { font-size:26px; font-weight:700; color:#30d158; }
  .refresh { display:block; margin:16px auto; background:#2c2c2e; color:#0a84ff; border:none; border-radius:12px; padding:10px 18px; font-size:15px; font-weight:600; }
</style>
</head>
<body>
  <h1>Diagnostic — test de 4 méthodes</h1>
  <button class="refresh" onclick="runAll()">Relancer les tests</button>
  <div id="results"></div>
<script>
const SYMBOL = "AIR.PA";
const yahoo = `https://query1.finance.yahoo.com/v8/finance/chart/${SYMBOL}`;

const METHODS = [
  { name:"1. allorigins (raw)", url:`https://api.allorigins.win/raw?url=${encodeURIComponent(yahoo)}` },
  { name:"2. corsproxy.io",     url:`https://corsproxy.io/?url=${encodeURIComponent(yahoo)}` },
  { name:"3. allorigins (get)", url:`https://api.allorigins.win/get?url=${encodeURIComponent(yahoo)}`, wrapped:true },
  { name:"4. thingproxy",       url:`https://thingproxy.freeboard.io/fetch/${yahoo}` },
];

function extractPrice(d){
  if(!d || !d.chart || !d.chart.result) return null;
  const m = d.chart.result[0].meta;
  return { price:m.regularMarketPrice, cur:m.currency };
}

async function test(method){
  const box = document.createElement("div");
  box.className = "card";
  box.innerHTML = `<div class="title">${method.name}</div>⏳ en cours…`;
  document.getElementById("results").appendChild(box);
  try{
    const r = await fetch(method.url);
    if(!r.ok){ box.className="card ko"; box.innerHTML=`<div class="title">${method.name}</div>❌ HTTP ${r.status}`; return; }
    let txt = await r.text();
    let d = JSON.parse(txt);
    if(method.wrapped && d.contents) d = JSON.parse(d.contents);
    const p = extractPrice(d);
    if(p){
      box.className="card ok";
      box.innerHTML=`<div class="title">${method.name}</div><div class="price">${p.price} ${p.cur}</div>✅ fonctionne`;
    } else {
      box.className="card ko";
      box.innerHTML=`<div class="title">${method.name}</div>⚠️ JSON reçu mais format inattendu : ${JSON.stringify(d).slice(0,150)}`;
    }
  }catch(e){
    box.className="card ko";
    box.innerHTML=`<div class="title">${method.name}</div>❌ ${e.message}`;
  }
}

function runAll(){
  document.getElementById("results").innerHTML="";
  METHODS.forEach(test);
}
runAll();
</script>
</body>
</html>
