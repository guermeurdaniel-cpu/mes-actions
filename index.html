<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bourse">
<title>Mes valeurs</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:-apple-system,sans-serif; background:#0c0c0e; color:#fff; min-height:100vh; padding:env(safe-area-inset-top) 12px 16px; }
  h1 { font-size:15px; color:#8e8e93; text-align:center; margin:10px 0 2px; }
  .section { font-size:11px; color:#636366; text-transform:uppercase; letter-spacing:.5px; margin:14px 4px 2px; }
  .total-card { background:#0a84ff; border-radius:14px; padding:12px 16px; margin-top:8px; display:flex; justify-content:space-between; align-items:center; }
  .total-card .lbl { font-size:13px; color:#cfe5ff; }
  .total-card .amount { font-size:22px; font-weight:800; }
  .row { background:#1c1c1e; border-radius:12px; padding:10px 12px; margin-top:7px; display:grid; grid-template-columns:1fr 88px; grid-gap:10px; align-items:center; }
  .info { min-width:0; }
  .nm { font-size:13px; font-weight:600; color:#e5e5ea; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sub { font-size:11px; color:#8e8e93; margin-top:3px; display:flex; gap:8px; align-items:baseline; flex-wrap:wrap; }
  .pr { font-size:16px; font-weight:700; color:#fff; }
  .up { color:#30d158; } .down { color:#ff453a; }
  .held { color:#0a84ff; font-weight:600; }
  .err { font-size:11px; color:#ff453a; }
  .spark { width:88px; height:40px; display:block; }
  .scale-note { font-size:10px; color:#636366; margin:8px 4px 0; }
  .refresh { display:block; margin:16px auto 0; background:#2c2c2e; color:#0a84ff; border:none; border-radius:10px; padding:8px 16px; font-size:14px; font-weight:600; }
</style>
</head>
<body>
  <h1>Mes valeurs</h1>

  <div id="total"></div>

  <div class="section">Marche en direct</div>
  <div id="cards"></div>

  <div class="section">Fonds Amundi</div>
  <div id="amundi"></div>

  <div id="scaleNote"></div>
  <button class="refresh" onclick="loadAll()">Actualiser</button>
<script>
// =======================================================
//  NOMBRE DE PARTS DETENUES — modifie uniquement ici
// =======================================================
const QUANTITES = {
  "AIR.PA": 0,
  "WPEA.PA": 0,
  "QS0009080175": 1156.7167 + 941.2472,
  "QS0009080746": 75.4236,
  "QS0009080720": 9.4187
};
// =======================================================

const TICKERS = [
  { symbol:"AIR.PA",  label:"Airbus" },
  { symbol:"WPEA.PA", label:"ETF MSCI World" }
];

let totals = {};

function formatEur(v){
  return v.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" EUR";
}
function heldMontant(key, unitPrice){
  const qty = QUANTITES[key] || 0;
  const montant = qty * unitPrice;
  totals[key] = montant;
  return { qty:qty, montant:montant };
}
function heldTxt(h){
  if(h.qty <= 0) return "";
  return '<span class="held">'+formatEur(h.montant)+'</span>';
}
function renderTotal(){
  let sum = 0;
  for(const k in totals){ if(isFinite(totals[k])) sum += totals[k]; }
  document.getElementById("total").innerHTML =
    '<div class="total-card"><span class="lbl">Total portefeuille</span>'
    + '<span class="amount">'+formatEur(sum)+'</span></div>';
}

function toBase100(values){
  if(!values || values.length < 2 || !values[0]) return null;
  return values.map(function(v){ return v/values[0]*100; });
}

function sparkline(values100, gmin, gmax, up){
  if(!values100 || values100.length < 2) return '<svg class="spark"></svg>';
  const w=88, h=40, pad=3;
  const range = (gmax-gmin) || 1;
  const yOf = function(v){ return h-pad - (v-gmin)/range*(h-2*pad); };
  const pts = values100.map(function(v,i){
    const x = pad + i*(w-2*pad)/(values100.length-1);
    return x.toFixed(1)+","+yOf(v).toFixed(1);
  }).join(" ");
  const color = up ? "#30d158" : "#ff453a";
  let baseline = "";
  if(gmin <= 100 && gmax >= 100){
    const y100 = yOf(100).toFixed(1);
    baseline = '<line x1="'+pad+'" y1="'+y100+'" x2="'+(w-pad)+'" y2="'+y100+'" stroke="#48484a" stroke-width="1" stroke-dasharray="2,2"/>';
  }
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+baseline+'<polyline fill="none" stroke="'+color+'" stroke-width="2" points="'+pts+'"/></svg>';
}

function variation(values){
  if(!values || values.length < 2) return null;
  const a=values[0], b=values[values.length-1];
  return (b-a)/a*100;
}
function lastChange(values){
  if(!values || values.length < 2) return null;
  const a=values[values.length-2], b=values[values.length-1];
  return { diff:b-a, pct:(b-a)/a*100 };
}

async function fetchYahoo(symbol){
  const yahoo = "https://query1.finance.yahoo.com/v8/finance/chart/"+symbol+"?range=1mo&interval=1d";
  const url = "https://corsproxy.io/?url="+encodeURIComponent(yahoo);
  const r = await fetch(url);
  if(!r.ok) throw new Error("HTTP " + r.status);
  const d = await r.json();
  const res = d.chart.result[0];
  const m = res.meta;
  const closes = (res.indicators.quote[0].close || []).filter(function(v){ return v!=null; });
  const price = (m.regularMarketPrice != null) ? m.regularMarketPrice : closes[closes.length-1];
  const prevClose = (m.previousClose != null) ? m.previousClose : closes[closes.length-2];
  return { price:price, prevClose:prevClose, currency:m.currency, time:new Date(m.regularMarketTime*1000), closes:closes };
}

function pctSpan(pct, label){
  if(pct==null || !isFinite(pct)) return "";
  return '<span class="'+(pct>=0?'up':'down')+'">'+label+(pct>=0?'+':'')+pct.toFixed(2)+'%</span>';
}

async function loadAll(){
  totals = {};
  document.getElementById("cards").innerHTML = '<div class="row"><div class="sub">Chargement...</div></div>';
  document.getElementById("amundi").innerHTML = "";
  document.getElementById("scaleNote").innerHTML = "";

  const items = [];

  for(const t of TICKERS){
    try{
      const q = await fetchYahoo(t.symbol);
      items.push({ kind:"yahoo", t:t, q:q, series100: toBase100(q.closes) });
    }catch(e){
      items.push({ kind:"yahoo-error", t:t, err:e.message });
    }
  }

  try{
    const navR = await fetch("nav.json?t=" + Date.now());
    let histR = null;
    try { histR = await fetch("history.json?t=" + Date.now()); } catch(e){ histR = null; }
    const data = await navR.json();
    const hist = (histR && histR.ok) ? await histR.json() : {};
    for(const isin in data){
      const f = data[isin];
      const series = (f.status==="ok" && f.value!=null) ? (hist[isin]||[]).map(function(e){return e.value;}) : [];
      items.push({ kind:"amundi", f:f, series:series, series100: toBase100(series) });
    }
  }catch(e){
    items.push({ kind:"amundi-error", err:e.message });
  }

  let gmin = Infinity, gmax = -Infinity;
  items.forEach(function(it){
    if(it.series100){ it.series100.forEach(function(v){ if(v<gmin) gmin=v; if(v>gmax) gmax=v; }); }
  });
  if(!isFinite(gmin) || !isFinite(gmax) || gmin===gmax){ gmin=95; gmax=105; }

  const cBox = document.getElementById("cards"); cBox.innerHTML="";
  const aBox = document.getElementById("amundi"); aBox.innerHTML="";

  items.forEach(function(it){
    const row = document.createElement("div"); row.className="row";
    if(it.kind==="yahoo"){
      const q=it.q, t=it.t;
      const diff=q.price-q.prevClose, pct=(diff/q.prevClose)*100;
      const dayPct = isFinite(pct)?pct:null;
      const moPct=variation(q.closes);
      const up=((moPct==null?0:moPct)>=0);
      const h=heldMontant(t.symbol,q.price);
      row.innerHTML =
        '<div class="info"><div class="nm">'+t.label+'</div>'
        +'<div class="sub"><span class="pr">'+q.price.toFixed(2)+'</span>'+pctSpan(dayPct,"j ")+pctSpan(moPct,"1m ")+heldTxt(h)+'</div></div>'
        + sparkline(it.series100,gmin,gmax,up);
      cBox.appendChild(row);
    } else if(it.kind==="yahoo-error"){
      row.innerHTML='<div class="info"><div class="nm">'+it.t.label+'</div><div class="err">Erreur : '+it.err+'</div></div><svg class="spark"></svg>';
      cBox.appendChild(row);
    } else if(it.kind==="amundi"){
      const f=it.f;
      if(f.status==="ok" && f.value!=null){
        const moPct=variation(it.series);
        const lc=lastChange(it.series);
        const dayPct = lc?lc.pct:null;
        const up=((moPct==null?0:moPct)>=0);
        const valStr=f.value.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2});
        const h=heldMontant(f.isin,f.value);
        const shortName = f.label.replace("Amundi ","").replace(" ESR - F","");
        row.innerHTML =
          '<div class="info"><div class="nm">'+shortName+'</div>'
          +'<div class="sub"><span class="pr">'+valStr+'</span>'+pctSpan(dayPct,"j ")+pctSpan(moPct,"tot ")+heldTxt(h)+'</div></div>'
          + sparkline(it.series100,gmin,gmax,up);
      } else {
        row.innerHTML='<div class="info"><div class="nm">'+f.label+'</div><div class="err">VL non disponible</div></div><svg class="spark"></svg>';
      }
      aBox.appendChild(row);
    } else if(it.kind==="amundi-error"){
      row.innerHTML='<div class="info"><div class="err">Erreur : '+it.err+'</div></div><svg class="spark"></svg>';
      aBox.appendChild(row);
    }
  });

  document.getElementById("scaleNote").innerHTML =
    '<div class="scale-note">Courbes base 100, echelle commune '+gmin.toFixed(1)+'-'+gmax.toFixed(1)+'. j = jour, 1m = 1 mois, tot = depuis debut.</div>';

  renderTotal();
}

loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
